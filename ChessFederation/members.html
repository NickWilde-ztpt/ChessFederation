    <title>GCF - Global Chess Federation</title>
    <style>
        :root { 
            --primary: #1e1b4b;     /* Deep volcanic slate */
            --secondary: #f97316;   /* Fiery orange matching your logo */
            --dark: #090514;        /* Dark obsidian background */
            --light: #f8fafc;       /* Crisp ice white text */
            --accent: #ef4444;      /* Intense red for badges */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--dark); color: var(--light); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary); padding: 1rem 2rem; border-bottom: 2px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; }
        nav a { color: var(--light); text-decoration: none; margin-left: 1.5rem; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--secondary); }
        .container { max-width: 1100px; margin: auto; padding: 2rem 1rem; flex: 1; text-align: center; }
        .hero { padding: 4rem 1rem; background: linear-gradient(rgba(9, 5, 20, 0.85), rgba(9, 5, 20, 0.85)), url('logo.png') center/cover; border-radius: 12px; border: 1px solid #334155; }
        h1 { font-size: 3rem; margin-bottom: 1rem; color: var(--light); }
        p { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 2rem; }
        .btn { background-color: var(--secondary); color: var(--dark); padding: 0.75rem 1.5rem; border: none; border-radius: 6px; font-weight: bold; text-decoration: none; display: inline-block; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        footer { background-color: #020617; text-align: center; padding: 1.5rem; font-size: 0.85rem; color: #64748b; margin-top: auto; }
        .member-table { width: 100%; border-collapse: collapse; }
        .member-table th, .member-table td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
