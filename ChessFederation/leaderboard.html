<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCF - Leaderboard</title>
    <style>
        :root { 
            --primary: #1e1b4b;     /* Deep volcanic slate */
            --secondary: #f97316;   /* Fiery orange matching your logo */
            --dark: #090514;        /* Dark obsidian background */
            --light: #f8fafc;       /* Crisp ice white text */
            --accent: #ef4444;      /* Intense red for badges */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--dark); color: var(--light); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary); padding: 1rem 2rem; border-bottom: 2px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--secondary); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--secondary); object-fit: cover; }
        nav a { color: var(--light); text-decoration: none; margin-left: 1.5rem; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--secondary); }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; flex: 1; }
        h2 { font-size: 2rem; color: var(--secondary); text-align: center; margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background-color: var(--primary); border-radius: 8px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; }
        th { background-color: #334155; color: var(--secondary); }
        tr:nth-child(even) { background-color: #16143c; }
        .badge { background-color: var(--accent); color: var(--light); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        footer { background-color: #020617; text-align: center; padding: 1.5rem; font-size: 0.85rem; color: #64748b; margin-top: auto; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <img src="logo.png" alt="GCF Logo" class="logo-img" onerror="this.style.display='none'"> 👑 GCF
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
            <a href="tournaments.html">Tournaments</a>
            <a href="titles.html">Titles</a>
            <a href="./about.html" style="color: #ff6b6b;">About</a>
            <a href="library.html">Library</a>
        </nav>
    </header>
    <div class="container">
        <h2>Official Standings</h2>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>GCF Title</th>
                    <th>Elo</th>
                </tr>
            </thead>
            <tbody id="leaderboard-data"></tbody>
        </table>
    </div>
    <footer>
        <p>&copy; 2026 GCF. Disclaimer: Independent online gaming community. Not affiliated with FIDE or Chess.com.</p>
    </footer>
    <script>
        // Synchronized object fields to track Elo instead of points
        const players = [
            { rank: 1, username: "NickWilde", title: "-", elo: 824 },
            { rank: 2, username: "-NA-", title: "-", elo: 0 },
            { rank: 3, username: "-NA-", title: "-", elo: 0 },
            { rank: 4, username: "-NA-", title: "-", elo: 0 },
            { rank: 5, username: "-NA-", title: "-", elo: 0 }
        ];
        function loadLeaderboard() {
            const tbody = document.getElementById("leaderboard-data");
            tbody.innerHTML = "";
            players.forEach(player => {
                const row = document.createElement("tr");
                
                // Displays a clean dash if there is no title assigned yet
                const titleDisplay = (player.title !== "-" && player.title !== "None") 
                    ? `<span class="badge">${player.title}</span>` 
                    : `<span style="color: #64748b;">—</span>`;
                    
                row.innerHTML = `<td><strong>#${player.rank}</strong></td><td>${player.username}</td><td>${titleDisplay}</td><td><strong>${player.elo}</strong></td>`;
                tbody.appendChild(row);
            });
        }
        window.onload = loadLeaderboard;
    </script>
</body>
</html>
